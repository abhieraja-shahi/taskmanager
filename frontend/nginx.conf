  server {
      listen 80;

      # Serve React SPA
      location / {
          root /usr/share/nginx/html;
          try_files $uri $uri/ /index.html;
      }

      # Proxy API routes to FastAPI
      location ~ ^/(auth|tasks|teams|dashboard|notifications|assignments|activity|zammad|banks|attachments|deployments|health) {
          proxy_pass http://backend:8000;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          client_max_body_size 20M;
      }

      # Proxy webhook to Flask
      location /webhook {
          proxy_pass http://webhook:5050;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Zammad-Trigger $http_x_zammad_trigger;
      }
  }