services:
  db:
    image: mysql:5.7
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data

  backend:
    build: ./task_manager
    restart: always
    env_file: .env
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery-worker:
    build: ./task_manager
    restart: always
    command: celery -A app.workers.celery_tasks worker --loglevel=info
    env_file: .env
    depends_on:
      - backend
      - redis

  celery-beat:
    build: ./task_manager
    restart: always
    command: celery -A app.workers.celery_tasks beat --loglevel=info
    env_file: .env
    depends_on:
      - backend
      - redis

  webhook:
    build: ./Webhook
    restart: always
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
      - webhook

volumes:
  mysql_data:
  redis_data:
  uploads: